# ---------------------------------------------------------
# SISTEMA BASE
# ---------------------------------------------------------
esphome:
  name: geekmagic
  friendly_name: GeekMagic Black
  platformio_options:
    board_build.ldscript: eagle.flash.1m256.ld

esp8266:
  board: esp01_1m

logger: 
  level: WARN

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

mdns:
  disabled: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: NONE
  fast_connect: true
  output_power: 17dB
  reboot_timeout: 0s
  use_address: 192.168.1.38
  manual_ip:
    static_ip: 192.168.1.38
    gateway: 192.168.1.1
    subnet: 255.255.255.0  
  ap:
    ssid: "GeekMagic Black"
    password: "12345678"

captive_portal:

# ---------------------------------------------------------
# HARDWARE
# ---------------------------------------------------------
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd
  
output:
  - platform: esp8266_pwm
    pin: GPIO05
    frequency: 100 Hz
    inverted: true
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_AND_ON

# ---------------------------------------------------------
# FUENTES
# ---------------------------------------------------------
font:
  - file: "gfonts://Roboto Mono"
    id: font_main
    size: 20
    glyphs: "0123456789°C/% KBteimploadfnrswu:"

  #- file: "materialdesignicons-webfont.ttf"
  #  id: icon_font
  #  size: 16
  #  glyphs: [
  #    "\U000F050F",
  #    "\U000F0875",
  #    "\U000F0210",
  #  ]

color:
  - id: c_bg
    hex: "000000"
  - id: c_white
    hex: "FFFFFF"
  - id: c_blue
    hex: "00D2FF"
  - id: c_red
    hex: "FF0033"
  - id: c_green
    hex: "4CAF50"
  - id: c_yellow
    hex: "FFEB3B"

# ---------------------------------------------------------
# SENSORES
# ---------------------------------------------------------
sensor:
  - platform: homeassistant
    id: cpu_temp
    entity_id: sensor.ryzen_amd_ryzen_5_3600_core_tctl_tdie_temperature
    internal: true
    filters:
      - throttle: 9s

  - platform: homeassistant
    id: cpu_load
    entity_id: sensor.ryzen_amd_ryzen_5_3600_cpu_total_load
    internal: true
    filters:
      - throttle: 9s

  - platform: homeassistant
    id: cpu_rpm
    entity_id: sensor.ryzen_msi_b450_gaming_pro_carbon_ac_ms_7b85_cpu_speed
    internal: true
    filters:
      - throttle: 9s

  - platform: homeassistant
    id: network_dw
    entity_id: sensor.ryzen_ethernet_2_download_speed_throughput
    internal: true
    filters:
      - throttle: 9s

  - platform: homeassistant
    id: network_up
    entity_id: sensor.ryzen_ethernet_2_upload_speed_throughput
    internal: true
    filters:
      - throttle: 9s

# ---------------------------------------------------------
# DISPLAY
# ---------------------------------------------------------
display:
  - platform: mipi_spi
    model: ST7789V
    spi_id: spihwd
    dc_pin: GPIO00
    reset_pin: GPIO02
    spi_mode: mode3

    dimensions:
      width: 240
      height: 240

    buffer_size: 12%
    invert_colors: true
    data_rate: 4MHz
    update_interval: 10s

    lambda: |-

      if (id(cpu_temp).has_state()) {
        it.filled_rectangle(100, 0, 60, 24, id(c_bg));
        it.print(10, 0, id(font_main), id(c_red), TextAlign::TOP_LEFT, "temp:");
        it.printf(100, 0, id(font_main), id(c_white), TextAlign::TOP_LEFT, "%.0f°C", id(cpu_temp).state);
      }

      if (id(cpu_load).has_state()) {
        it.filled_rectangle(100, 30, 60, 24, id(c_bg));
        it.print(10, 30, id(font_main), id(c_green), TextAlign::TOP_LEFT, "load:");
        it.printf(100, 30, id(font_main), id(c_white), TextAlign::TOP_LEFT, "%.0f%%", id(cpu_load).state);
      }

      if (id(cpu_rpm).has_state()) {
        it.filled_rectangle(100, 60, 80, 24, id(c_bg));
        it.print(10, 60, id(font_main), id(c_blue), TextAlign::TOP_LEFT, "fan:");
        it.printf(100, 60, id(font_main), id(c_white), TextAlign::TOP_LEFT, "%.0f rpm", id(cpu_rpm).state);
      }

      if (id(network_dw).has_state()) {
        it.filled_rectangle(100, 90, 80, 24, id(c_bg));
        it.print(10, 90, id(font_main), id(c_yellow), TextAlign::TOP_LEFT, "down:");
        it.printf(100, 90, id(font_main), id(c_white), TextAlign::TOP_LEFT, "%.0f KB/s", id(network_dw).state);
      }

      if (id(network_up).has_state()) {
        it.filled_rectangle(100, 120, 80, 24, id(c_bg));
        it.print(10, 120, id(font_main), id(c_yellow), TextAlign::TOP_LEFT, "up:");
        it.printf(100, 120, id(font_main), id(c_white), TextAlign::TOP_LEFT, "%.0f KB/s", id(network_up).state);
      }
